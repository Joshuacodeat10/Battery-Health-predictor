<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battery Health Predictor | Insight</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Montserrat:wght@600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --vercel-black: #000000;
            --vercel-gray: #666666;
            --vercel-light-gray: #fafafa;
            --vercel-border: #eaeaea;
            --vercel-blue: #0070f3;
            --radius: 8px;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #ffffff;
            color: var(--vercel-black);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 2.5rem;
            letter-spacing: -0.05rem;
            margin-bottom: 10px;
        }

        p.subtitle {
            color: var(--vercel-gray);
            font-size: 1.1rem;
        }

        form {
            background: #fff;
            border: 1px solid var(--vercel-border);
            border-radius: var(--radius);
            padding: 32px;
            box-shadow: 0 4px 14px 0 rgba(0,0,0,0.05);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
        }

        .input-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--vercel-gray);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        label img {
            width: 16px;
            height: 16px;
        }

        input, select {
            padding: 10px 12px;
            border-radius: 6px;
            border: 1px solid var(--vercel-border);
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--vercel-black);
            box-shadow: 0 0 0 2px rgba(0,0,0,0.05);
        }

        .submit-btn {
            grid-column: span 2;
            background-color: var(--vercel-black);
            color: white;
            padding: 12px;
            border-radius: var(--radius);
            border: 1px solid var(--vercel-black);
            font-weight: 500;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: white;
            color: var(--vercel-black);
        }

        /* Results Section */
        .results {
            margin-top: 30px;
            padding: 24px;
            border-radius: var(--radius);
            background-color: var(--vercel-light-gray);
            border: 1px solid var(--vercel-border);
            animation: fadeIn 0.5s ease;
        }

        .result-item {
            margin-bottom: 15px;
        }

        .result-label {
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05rem;
            color: var(--vercel-gray);
        }

        .result-value {
            font-size: 1.25rem;
            font-weight: 500;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Battery Insight</h1>
        <p class="subtitle">Predict hardware longevity with precision.</p>
    </header>

    <form method="POST" action="/">
        <div class="grid">
            <div class="input-group">
                <label><img src="https://img.icons8.com/material-outlined/24/000000/calendar.png"/> Device Age (months)</label>
                <input type="number" name="device_age" min="1" required placeholder="e.g. 12">
            </div>

            <div class="input-group">
                <label><img src="https://img.icons8.com/material-outlined/24/000000/lightning-bolt.png"/> Capacity (mAh)</label>
                <input type="number" name="battery_capacity" min="1" required placeholder="e.g. 4500">
            </div>

            <div class="input-group">
                <label><img src="https://img.icons8.com/material-outlined/24/000000/iphone-x.png"/> Screen Time (Hrs)</label>
                <input type="number" name="screen_time" min="1" required placeholder="Daily avg">
            </div>

            <div class="input-group">
                <label><img src="https://img.icons8.com/material-outlined/24/000000/refresh.png"/> Cycles / Week</label>
                <input type="number" name="charging_cycles" min="1" required>
            </div>

            <div class="input-group">
                <label><img src="https://img.icons8.com/material-outlined/24/000000/thermometer.png"/> Temp (°C)</label>
                <input type="number" name="battery_temperature" min="1" step="0.1" required>
            </div>

            <div class="input-group">
                <label><img src="https://img.icons8.com/material-outlined/24/000000/flash-on.png"/> Fast Charging %</label>
                <input type="number" name="fast_charging" min="1" max="100" required>
            </div>

            <div class="input-group">
                <label><img src="https://img.icons8.com/material-outlined/24/000000/moon-symbol.png"/> Overnight / Week</label>
                <input type="number" name="overnight_charging" min="0" required>
            </div>

            <div class="input-group">
                <label><img src="https://img.icons8.com/material-outlined/24/000000/controller.png"/> Gaming / Week</label>
                <input type="number" name="gaming_hours" min="0" required>
            </div>

            <div class="input-group">
                <label><img src="https://img.icons8.com/material-outlined/24/000000/video-playlist.png"/> Streaming / Week</label>
                <input type="number" name="streaming_hours" min="0" required>
            </div>

            <div class="input-group">
                <label><img src="https://img.icons8.com/material-outlined/24/000000/layers.png"/> Background App</label>
                <select name="background_app_usage" required>
                    <option value="Low">Low</option>
                    <option value="Medium" selected>Medium</option>
                    <option value="High">High</option>
                </select>
            </div>

            <div class="input-group">
                <label><img src="https://img.icons8.com/material-outlined/24/000000/checked-user-male.png"/> Habit Score</label>
                <input type="number" name="charging_habit" min="0" required>
            </div>

            <div class="input-group">
                <label><img src="https://img.icons8.com/material-outlined/24/000000/activity-history.png"/> Intensity Score</label>
                <input type="number" name="usage_intensity" min="1" required>
            </div>

            <div class="input-group" style="grid-column: span 2;">
                <label><img src="https://img.icons8.com/material-outlined/24/000000/error.png"/> Thermal Stress Index</label>
                <input type="number" name="stress_index" min="1" required>
            </div>

            <input type="submit" name="submit" value="Predict Battery Health" class="submit-btn">
        </div>
    </form>

    {% if battery_percentage or rec_action %}
    <div class="results">
        {% if battery_percentage %}
        <div class="result-item">
            <div class="result-label">Predicted Health</div>
            <div class="result-value" style="color: var(--vercel-blue);">{{ battery_percentage }}%</div>
        </div>
        {% endif %}

        {% if rec_action %}
        <div class="result-item">
            <div class="result-label">Recommendation</div>
            <div class="result-value" style="font-size: 1rem;">{{ rec_action }}</div>
        </div>
        {% endif %}
    </div>
    {% endif %}
</div>

</body>
</html>
